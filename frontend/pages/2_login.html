<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Center — Sign In</title>

  <!-- Apply saved theme before paint (no flash) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("erms_theme") || "auto";
        if (t === "dark" || (t === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    })();
  </script>

  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/9_auth-gm.css" />
  <style>
    /* Login-only ambient network background (behind the card) */
    /* Stack the card + feature strip vertically */
    .gm-main { flex-direction: column; gap: 26px; }

    .login-features { width: 100%; max-width: 760px; position: relative; z-index: 2; }
    .lf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .lf-card {
      display: flex; align-items: center; gap: 12px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .lf-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px -12px rgba(245,158,11,0.4); }
    .lf-icon {
      width: 40px; height: 40px; border-radius: 11px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .lf-icon.blue   { background:#e0edff; color:#2563eb; }
    .lf-icon.green  { background:#dcfce7; color:#16a34a; }
    .lf-icon.purple { background:#ede9fe; color:#7c3aed; }
    html.dark .lf-icon.blue   { background:rgba(37,99,235,0.18);  color:#60a5fa; }
    html.dark .lf-icon.green  { background:rgba(22,163,74,0.18);  color:#4ade80; }
    html.dark .lf-icon.purple { background:rgba(124,58,237,0.20); color:#a78bfa; }
    .lf-title { font-size: 13px; font-weight: 600; color: var(--input-text); line-height: 1.3; }

    @media (max-width: 640px) {
      .lf-grid { grid-template-columns: 1fr; }
      .login-features { max-width: 420px; }
    }
  </style>
</head>
<body>

  <!-- Glass header -->
  <header class="gm-header">
    <a class="gm-logo" href="/pages/1_index.html" aria-label="Planning Center home">
      <span class="t">Planning</span>
      <span class="b">Center</span>
    </a>
    <div class="gm-actions">
      <button class="gm-btn ghost" onclick="location.href='/pages/3_register.html'">Sign up</button>
      <button class="gm-btn solid" aria-current="page">Sign in</button>
    </div>
  </header>

  <main class="gm-main">
    <div class="card">
      <h1>Welcome back</h1>
      <p class="sub">Sign in to your Planning Center account</p>

      <form id="gmLoginForm" novalidate>

        <!-- Email -->
        <div class="field">
          <input type="email" id="loginEmail" placeholder=" " autocomplete="email" required />
          <label for="loginEmail">Email address</label>
          <i class="ri-check-line valid-tick" aria-hidden="true"></i>
          <div class="field-error" role="alert"></div>
        </div>

        <!-- Password -->
        <div class="field">
          <input type="password" id="loginPassword" placeholder=" " autocomplete="current-password" required />
          <label for="loginPassword">Password</label>
          <button type="button" class="pw-toggle" aria-label="Show password">
            <i class="ri-eye-line" aria-hidden="true"></i>
          </button>
          <div class="field-error" role="alert"></div>
        </div>

        <div class="auth-row">
          <label class="remember">
            <input type="checkbox" id="rememberMe" /> Remember me
          </label>
          <a class="forgot" href="/pages/12_forgot-password.html">Forgot password?</a>
        </div>

        <button type="submit" class="cta" id="ctaBtn">
          <span class="spinner" aria-hidden="true"></span>
          <span class="label">Sign in</span>
          <span class="check" aria-hidden="true"><i class="ri-check-line"></i></span>
        </button>
      </form>

      <p class="foot">Don't have an account? <a href="/pages/3_register.html">Sign up</a></p>
    </div>

    <section class="login-features" aria-label="Platform features">
      <div class="lf-grid">
        <div class="lf-card">
          <div class="lf-icon blue"><i class="ri-calendar-event-line" aria-hidden="true"></i></div>
          <div class="lf-title">Browse &amp; Register for Events</div>
        </div>
        <div class="lf-card">
          <div class="lf-icon green"><i class="ri-qr-code-line" aria-hidden="true"></i></div>
          <div class="lf-title">Digital QR Tickets</div>
        </div>
        <div class="lf-card">
          <div class="lf-icon purple"><i class="ri-dashboard-3-line" aria-hidden="true"></i></div>
          <div class="lf-title">Role Dashboards</div>
        </div>
      </div>
    </section>
  </main>

  <script src="/assets/js/0_api.js"></script>
  <script type="module" src="/assets/js/3_auth.js"></script>

  <script type="module">
  import { apiLogin } from '/assets/js/Fakedata/api.js';
  (function () {
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const $ = (id) => document.getElementById(id);
    const form = $("gmLoginForm");
    if (!form) return;

    const F = { email: $("loginEmail"), pw: $("loginPassword") };
    const emailOk = (v) => (typeof isValidEmail === "function") ? isValidEmail(v)
      : /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

    const touched = {};

    function check(name) {
      const el = F[name];
      const v = el.value.trim();
      let ok = true, msg = "";
      if (name === "email") { ok = !!v && emailOk(v); msg = !v ? "Email is required." : "Enter a valid email address."; }
      if (name === "pw")    { ok = !!el.value;        msg = "Password is required."; }
      setState(el, ok, msg);
      return ok;
    }

    function setState(el, ok, msg) {
      const field = el.closest(".field");
      const errEl = field.querySelector(".field-error");
      field.classList.toggle("valid", ok && el.value.trim() !== "");
      field.classList.toggle("invalid", !ok);
      if (errEl) errEl.textContent = ok ? "" : msg;
    }

    function shake(el) {
      if (reduce) return;
      const field = el.closest(".field");
      field.classList.remove("shaking");
      void field.offsetWidth;
      field.classList.add("shaking");
    }

    ["email", "pw"].forEach((name) => {
      const el = F[name];
      el.addEventListener("blur", () => { touched[name] = true; if (!check(name)) shake(el); });
      el.addEventListener("input", () => { if (touched[name]) check(name); });
    });

    document.querySelectorAll(".pw-toggle").forEach((btn) => {
      btn.addEventListener("click", () => {
        const input = btn.parentElement.querySelector("input");
        const icon = btn.querySelector("i");
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        icon.className = show ? "ri-eye-off-line" : "ri-eye-line";
        btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
      });
    });

    form.addEventListener("focusin", (e) => {
      if (!e.target.matches("input")) return;
      const r = e.target.getBoundingClientRect();
      if (r.top < 80 || r.bottom > window.innerHeight - 24) {
        e.target.scrollIntoView({ behavior: reduce ? "auto" : "smooth", block: "center" });
      }
    });

    const cta = $("ctaBtn");
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (cta.classList.contains("loading") || cta.classList.contains("success")) return;

      let firstBad = null, allOk = true;
      ["email", "pw"].forEach((n) => {
        touched[n] = true;
        if (!check(n)) { allOk = false; if (!firstBad) firstBad = F[n]; }
      });
      if (!allOk) { if (firstBad) { shake(firstBad); firstBad.focus(); } return; }

      cta.classList.add("loading");
      cta.disabled = true;

      apiLogin(F.email.value.trim(), F.pw.value).then(function () {
        cta.classList.remove("loading");
        cta.disabled = false;
        cta.classList.add("success");
        setTimeout(() => {
          var role = localStorage.getItem("erms_role") || "Attendee";
          var dest = { "Supervisor": "/pages/7_superadmin-dashboard.html", "Admin": "/pages/6_admin-dashboard.html", "Organizer": "/pages/5_organizer-dashboard.html", "Attendee": "/pages/4_attendee-dashboard.html" };
          window.location.href = dest[role];
        }, reduce ? 250 : 650);
      }).catch(function (err) {
        cta.classList.remove("loading");
        cta.disabled = false;
        var msg = err.message || String(err);
        if (msg.toLowerCase().includes("password")) {
          setState(F.pw, false, msg);
          shake(F.pw); F.pw.focus();
        } else {
          setState(F.email, false, msg);
          shake(F.email); F.email.focus();
        }
      });
    });
  })();
  </script>
  <script src="/assets/js/8_auth-doodle.js"></script>
  <script src="/assets/js/7_cursor.js"></script>
</body>
</html>
